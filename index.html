<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>暗线调查</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f6f2ea;
  --bg-2:#eee7da;
  --paper:#fffdf8;
  --paper-2:#faf6ef;
  --line:#ddd2c0;
  --line-strong:#ccbda6;
  --text:#223249;
  --muted:#6f7886;
  --primary:#203a5f;
  --accent:#8b6a3f;
  --shadow:0 18px 40px rgba(54,50,44,.10);
}
html,body{
  height:100%;
  background:
    linear-gradient(180deg,rgba(255,255,255,.54),rgba(255,255,255,0)),
    radial-gradient(circle at top,rgba(32,58,95,.08),transparent 34%),
    linear-gradient(180deg,var(--bg),var(--bg-2));
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  transition:background .45s ease,color .24s ease;
}
body{overflow:hidden}
button,input{font:inherit}
button{border:none;background:none}
#app{
  position:relative;
  height:100%;
  max-width:540px;
  margin:0 auto;
  background:rgba(255,253,248,.72);
  transition:background .45s ease,box-shadow .28s ease;
}
.page{display:none;height:100%}
.page.active{display:flex}
.scroll{overflow:auto}
.card{
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:24px;
  box-shadow:var(--shadow);
}
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  min-height:48px;
  padding:12px 18px;
  border-radius:16px;
  cursor:pointer;
  transition:transform .16s ease, box-shadow .16s ease, background .16s ease, border-color .16s ease;
}
.btn:active{transform:scale(.98)}
.btn-primary{
  background:var(--primary);
  color:#fff;
  box-shadow:0 12px 24px rgba(32,58,95,.18);
}
.btn-primary:hover{transform:translateY(-1px)}
.btn-secondary{
  background:var(--paper);
  color:var(--primary);
  border:1px solid var(--line-strong);
}
.link-btn{
  color:var(--primary);
  text-decoration:underline;
  text-decoration-thickness:1px;
  text-underline-offset:3px;
  cursor:pointer;
}
.pill{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 10px;
  border-radius:999px;
  background:var(--paper-2);
  border:1px solid var(--line);
  color:var(--muted);
  font-size:12px;
}
.hero{align-items:center;justify-content:center;padding:20px}
.hero-box{width:100%;padding:22px 20px}
.hero-kicker{color:var(--accent);font-size:12px;letter-spacing:2px;margin-bottom:14px}
.hero-title{font-size:40px;font-weight:800;letter-spacing:6px;margin-bottom:10px}
.hero-subtitle{color:var(--muted);font-size:14px;line-height:1.8;margin-bottom:18px}
.hero-copy{display:grid;gap:10px;font-size:15px;line-height:1.85;margin-bottom:18px}
.hero-task{
  display:grid;
  gap:10px;
  margin-bottom:18px;
  padding:18px;
  border-radius:22px;
  border:1px solid rgba(32,58,95,.14);
  background:linear-gradient(180deg,#fff,#f8f3ea);
  box-shadow:0 18px 32px rgba(32,58,95,.08);
  font-size:15px;
  line-height:1.8;
}
.hero-foot{color:var(--muted);font-size:13px;margin-bottom:18px}
.hero-actions{display:flex;flex-wrap:wrap;gap:10px}
.briefing-plan{
  margin-bottom:18px;
}
.briefing-plan .btn{
  min-width:132px;
}
.briefing-task-title{
  font-size:12px;
  color:var(--accent);
  letter-spacing:1px;
}
.topline{
  position:sticky;
  top:0;
  z-index:10;
  background:rgba(246,242,234,.95);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(204,189,166,.8);
}
.topline-inner{padding:14px 18px 12px}
.topline-label{color:var(--accent);font-size:12px;margin-bottom:5px}
.topline-text{font-size:17px;line-height:1.55;font-weight:700}
.topline-text,.story-block p,.narrative p,.object-card p,.result-box p,.dialogue-bubble p,.sheet-body p,.ending-sub,.speech-text{white-space:pre-wrap}
.type-line{
  opacity:0;
  transform:translateY(6px);
  animation:typeLineIn .24s ease forwards;
}
.is-typing::after{
  content:"";
  display:inline-block;
  width:2px;
  height:1em;
  margin-left:4px;
  vertical-align:-2px;
  background:currentColor;
  animation:caretBlink .9s steps(1,end) infinite;
}
@keyframes typeLineIn{
  from{opacity:0;transform:translateY(6px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes caretBlink{
  0%,49%{opacity:1}
  50%,100%{opacity:0}
}
.type-locked{overflow:hidden}
.deferred-reveal{
  opacity:0;
  transform:translateY(18px) scale(.985);
  filter:none;
  visibility:hidden;
  pointer-events:none;
}
.deferred-reveal.show{
  opacity:1;
  transform:translateY(0) scale(1);
  visibility:visible;
  pointer-events:auto;
  transition:opacity .46s ease,transform .46s cubic-bezier(.22,.8,.2,1),box-shadow .46s ease,border-color .46s ease;
}
.spotlight-reveal.show{
  box-shadow:0 24px 46px rgba(32,58,95,.16);
  border-color:rgba(32,58,95,.28);
}
.pop-in{
  animation:spotlightPanelIn .48s cubic-bezier(.2,.78,.24,1) both;
}
@keyframes spotlightPanelIn{
  0%{opacity:0;transform:translateY(24px) scale(.97)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
.page-shell{display:flex;flex-direction:column;width:100%;min-height:100%}
.content{padding:18px 18px 28px}
.dayline{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px 0 18px;color:var(--muted);font-size:13px}
.dayline strong{color:var(--text);font-size:20px}
.story-body{display:grid;gap:18px}
.story-block h3{font-size:12px;letter-spacing:1px;color:var(--accent);margin-bottom:8px}
.story-block p{font-size:16px;line-height:1.9}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--line-strong),transparent)}
.plan-panel{
  margin-top:22px;
  padding:18px;
  border-radius:24px;
  border:1px solid rgba(32,58,95,.14);
  background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(250,246,239,.95));
  box-shadow:0 20px 36px rgba(32,58,95,.08);
}
.plan-panel.compact .plan-title,
.plan-panel.compact .plan-desc{
  display:none;
}
.plan-panel.compact .btn-ghost{
  display:none;
}
.plan-panel.compact{
  padding:16px 18px;
}
.plan-meta{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:12px;
}
.plan-label{
  color:var(--accent);
  font-size:12px;
  letter-spacing:1px;
}
.plan-title{
  font-size:22px;
  line-height:1.45;
  font-weight:800;
  margin-bottom:8px;
}
.plan-desc{
  color:var(--muted);
  font-size:15px;
  line-height:1.8;
}
.plan-actions{
  display:flex;
  gap:12px;
  margin-top:16px;
}
.plan-actions.single{
  margin-top:0;
}
.plan-actions.hidden{
  display:none;
}
.btn-ghost{
  min-height:46px;
  padding:12px 16px;
  border-radius:16px;
  border:1px solid rgba(32,58,95,.16);
  background:rgba(255,255,255,.8);
  color:var(--primary);
  cursor:pointer;
}
.action-wrap{margin-top:24px}
.action-card{
  width:100%;
  text-align:left;
  padding:22px 20px;
  border-radius:28px;
  background:
    radial-gradient(circle at right top,rgba(255,255,255,.34),transparent 34%),
    linear-gradient(180deg,#223a5c,#16263f);
  border:1px solid rgba(255,255,255,.18);
  box-shadow:0 26px 52px rgba(20,34,56,.24);
  cursor:pointer;
  transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.action-card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.36);box-shadow:0 28px 56px rgba(20,34,56,.28)}
.action-card:disabled{opacity:.55;cursor:not-allowed;transform:none}
.action-kicker{display:flex;justify-content:space-between;align-items:center;gap:10px;color:rgba(255,243,225,.84);font-size:12px;margin-bottom:16px}
.action-kicker::after{content:"→";font-size:20px;color:#fff}
.action-card strong{display:block;font-size:26px;line-height:1.45;margin-bottom:10px;color:#fff}
.action-card span{display:block;font-size:15px;line-height:1.8;color:rgba(234,239,246,.82)}
.action-card.emphasis.show{
  box-shadow:0 30px 60px rgba(20,34,56,.30);
  border-color:rgba(255,255,255,.34);
}
.utility{display:flex;flex-wrap:wrap;gap:12px 16px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
.utility .link-btn{font-size:14px}
.page-header{padding:14px 18px 8px;background:rgba(246,242,234,.94);border-bottom:1px solid rgba(204,189,166,.8)}
.header-row{display:flex;justify-content:space-between;align-items:center;gap:12px}
.plain-back{color:var(--primary);cursor:pointer;font-size:14px}
.page-title{font-size:24px;font-weight:800;margin-top:12px}
.page-sub{margin-top:6px;color:var(--muted);line-height:1.7;font-size:14px}
.scene-shell,.dialogue-shell,.board-shell{display:flex;flex-direction:column;min-height:100%}
.scene-content,.dialogue-content,.board-content{padding:18px;display:grid;gap:18px}
.narrative{display:grid;gap:12px}
.narrative p{font-size:16px;line-height:1.9}
.object-card,.question-card,.result-box,.dialogue-bubble,.board-group{
  padding:16px;
  border-radius:22px;
  border:1px solid var(--line-strong);
  background:var(--paper);
}
.object-card h4,.board-group h4{font-size:18px;margin-bottom:8px}
.object-card p,.board-group p,.question-intro,.result-box p,.dialogue-bubble p{font-size:15px;line-height:1.85}
.object-card p,.board-group p,.question-intro{color:var(--muted)}
.object-list,.option-list,.evidence-grid,.board-groups{display:grid;gap:12px}
.question-title{font-size:20px;font-weight:800;line-height:1.5;margin-bottom:14px}
.option-btn,.evidence-btn{
  width:100%;
  text-align:left;
  padding:14px 16px;
  border-radius:16px;
  border:1px solid var(--line);
  background:#fbf8f2;
  cursor:pointer;
  transition:transform .16s ease,border-color .16s ease,background .16s ease;
}
.option-btn:hover,.evidence-btn:hover{transform:translateY(-1px);border-color:var(--primary);background:#fff}
.option-btn strong,.evidence-btn strong{display:block;font-size:15px;margin-bottom:6px}
.option-btn span,.evidence-btn span{display:block;font-size:14px;line-height:1.7;color:var(--muted)}
.option-btn .speaker{
  display:block;
  font-size:12px;
  color:var(--accent);
  margin-bottom:8px;
}
.option-btn-you{
  background:linear-gradient(180deg,#fff,#f7f1e7);
  border-color:var(--line-strong);
}
.result-box h4{font-size:18px;margin-bottom:10px}
.result-box .btn{margin-top:8px}
.board-title{font-size:14px;color:var(--accent);margin-bottom:4px}
.choice-note{font-size:13px;color:var(--muted);line-height:1.7;margin-top:-2px}
.dialogue-bubble{
  max-width:88%;
  margin-right:auto;
  box-shadow:0 10px 22px rgba(54,50,44,.07);
}
.bubble-label{
  display:block;
  font-size:12px;
  color:var(--accent);
  margin-bottom:6px;
}
.dialogue-result{display:grid;gap:12px}
.dialogue-history{display:grid;gap:12px}
.speech-row{display:flex}
.speech-row.you{justify-content:flex-end}
.speech{
  max-width:88%;
  padding:14px 16px;
  border-radius:18px;
  border:1px solid var(--line);
  background:var(--paper);
  box-shadow:0 8px 18px rgba(54,50,44,.06);
}
.speech.you{
  background:linear-gradient(180deg,#fff,#f7f1e7);
  border-color:var(--line-strong);
}
.speech-label{
  display:block;
  font-size:12px;
  color:var(--accent);
  margin-bottom:6px;
}
.speech-text{
  display:block;
  font-size:15px;
  line-height:1.85;
}
.speech.meta{
  background:linear-gradient(180deg,#fff,#eef3fb);
  border-color:rgba(32,58,95,.16);
}
.speech.meta .speech-label{
  color:var(--primary);
}
.page.action-mode{
  background:
    radial-gradient(circle at top,rgba(32,58,95,.10),transparent 36%),
    linear-gradient(180deg,#e7edf5 0%,#eff2f6 38%,#f6f2ea 100%);
}
.page.action-mode .topline,
.page.action-mode .page-header{
  background:rgba(228,236,246,.92);
  border-color:rgba(32,58,95,.12);
}
.page.action-mode .page-title{
  color:var(--primary);
}
.phase-pill-action{
  background:rgba(32,58,95,.08);
  border-color:rgba(32,58,95,.18);
  color:var(--primary);
}
.phase-pill-result{
  background:rgba(139,106,63,.10);
  border-color:rgba(139,106,63,.20);
  color:var(--accent);
}
.scenePage-result .page-header,
.scenePage-result #sceneNarrative,
.scenePage-result .object-list,
.scenePage-result #sceneTaskWrap,
.dialoguePage-result .page-header,
.dialoguePage-result #dialogueNarrative,
.dialoguePage-result .dialogue-bubble,
.dialoguePage-result #dialogueChoices,
.boardPage-result .page-header,
.boardPage-result #boardIntro,
.boardPage-result #boardGroups,
.boardPage-result #boardChoices{
  display:none !important;
}
.scenePage-result .scene-content,
.dialoguePage-result .dialogue-content,
.boardPage-result .board-content{
  min-height:calc(100vh - 86px);
  align-content:center;
}
.scenePage-result #sceneResultWrap,
.dialoguePage-result #dialogueResultWrap,
.boardPage-result #boardResultWrap{
  display:grid;
}
.result-spotlight{
  padding:22px 18px;
  border-radius:26px;
  border:1px solid rgba(32,58,95,.18);
  background:linear-gradient(180deg,#fffdf9,#f7f1e7);
  box-shadow:0 30px 55px rgba(32,58,95,.15);
}
.result-kicker{
  display:block;
  margin-bottom:10px;
  font-size:12px;
  letter-spacing:1px;
  color:var(--accent);
}
.result-next{
  margin-top:16px;
}
.logic-map{
  display:grid;
  gap:14px;
  margin-top:6px;
}
.logic-chain{
  display:grid;
  gap:12px;
}
.logic-node{
  padding:14px 16px;
  border-radius:18px;
  border:1px solid rgba(32,58,95,.14);
  background:#fff;
  box-shadow:0 10px 20px rgba(32,58,95,.06);
}
.logic-node strong{
  display:block;
  font-size:16px;
  margin-bottom:4px;
}
.logic-node span{
  display:block;
  color:var(--muted);
  font-size:14px;
  line-height:1.7;
}
.logic-arrow{
  text-align:center;
  color:var(--accent);
  font-size:20px;
  line-height:1;
}
.logic-final{
  padding:18px 16px;
  border-radius:22px;
  border:1px solid rgba(20,34,56,.18);
  background:linear-gradient(180deg,#223a5c,#1a2c47);
  color:#fff;
  box-shadow:0 18px 36px rgba(20,34,56,.22);
}
.logic-final .result-kicker{
  color:rgba(255,243,225,.82);
}
.logic-final h4{
  margin-bottom:8px;
  font-size:24px;
}
.logic-final p{
  color:rgba(234,239,246,.86);
  margin:0;
}
.overlay{
  position:absolute;
  inset:0;
  display:none;
  align-items:flex-end;
  background:rgba(25,31,38,.26);
  z-index:50;
}
.overlay.show{display:flex}
.sheet{
  width:100%;
  max-height:88%;
  overflow:auto;
  background:var(--paper);
  border-top-left-radius:26px;
  border-top-right-radius:26px;
  border:1px solid var(--line);
  box-shadow:0 -18px 40px rgba(54,50,44,.12);
}
.sheet-inner{padding:20px 18px 28px}
.sheet-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
.sheet-title{font-size:22px;font-weight:800}
.sheet-body{display:grid;gap:12px}
.sheet-body p,.fact{font-size:15px;line-height:1.85}
.fact{padding:12px 14px;border-radius:16px;background:#faf6ef;border:1px solid var(--line)}
.floating{
  position:absolute;
  left:50%;
  top:18px;
  transform:translateX(-50%) translateY(-8px);
  padding:10px 14px;
  border-radius:999px;
  background:rgba(32,58,95,.95);
  color:#fff;
  font-size:12px;
  opacity:0;
  pointer-events:none;
  transition:.22s;
  z-index:60;
}
.floating.show{opacity:1;transform:translateX(-50%) translateY(0)}
.ending-title{font-size:30px;line-height:1.3;font-weight:800;margin:14px 0 10px}
.ending-sub{color:var(--muted);font-size:15px;line-height:1.85;margin-bottom:16px}
@media (max-width:430px){
  .hero-title{font-size:34px;letter-spacing:4px}
  .action-card strong{font-size:20px}
  .story-block p,.narrative p,.object-card p,.result-box p,.dialogue-bubble p{font-size:15px}
}
</style>
</head>
<body>
<div id="app">
  <div id="toast" class="floating"></div>

  <section id="briefingPage" class="page hero active">
    <div class="hero-box card">
      <div class="hero-kicker">任务编号 / A-17</div>
      <div class="hero-title">暗线调查</div>
      <div class="hero-subtitle">五天内查清一笔异常项目资金，到底是谁在背后拍板。</div>
      <div id="briefingCopy" class="hero-copy"></div>
      <div id="briefingPlan" class="briefing-plan">
        <button id="briefingPlanBtn" class="btn btn-primary">制定方案</button>
      </div>
      <div id="briefingTask" class="hero-task"></div>
      <div id="briefingFoot" class="hero-foot"></div>
      <div id="briefingActions" class="hero-actions">
        <button id="startBtn" class="btn btn-primary">开始调查</button>
        <button id="openSummaryFromBriefing" class="link-btn">查看案卷摘要</button>
      </div>
    </div>
  </section>

  <section id="hubPage" class="page scroll">
    <div class="page-shell">
      <div class="topline">
        <div class="topline-inner">
          <div class="topline-label">当前主线</div>
          <div id="toplineText" class="topline-text"></div>
        </div>
      </div>
      <div class="content">
        <div class="dayline">
          <div><strong id="dayTitle"></strong></div>
          <div class="pill" id="dayBadge"></div>
        </div>
        <div class="story-body">
          <section class="story-block">
            <h3>刚发现什么</h3>
            <p id="storyRecap"></p>
          </section>
          <div class="divider"></div>
          <section class="story-block">
            <h3>现在怀疑什么</h3>
            <p id="storySuspicion"></p>
          </section>
          <div class="divider"></div>
          <section id="storyNextBlock" class="story-block">
            <h3>下一步去哪</h3>
            <p id="storyNext"></p>
          </section>
        </div>
        <div id="planPanel" class="plan-panel">
          <div class="plan-meta">
            <div class="plan-label">下一步安排</div>
            <div class="pill" id="planBadge">待制定</div>
          </div>
          <div id="planTitle" class="plan-title"></div>
          <div id="planDesc" class="plan-desc"></div>
          <div id="planActions" class="plan-actions">
            <button id="makePlanBtn" class="btn btn-primary">制定计划</button>
            <button id="planSummaryBtn" class="btn-ghost">先看案卷摘要</button>
          </div>
        </div>
        <div id="actionWrap" class="action-wrap">
          <button id="mainActionBtn" class="action-card emphasis">
            <div class="action-kicker">当天唯一行动</div>
            <strong id="actionTitle"></strong>
            <span id="actionDesc"></span>
          </button>
          <div class="utility">
            <button id="openEvidenceBtn" class="link-btn">查看证据</button>
            <button id="openCharacterBtn" class="link-btn">角色档案</button>
            <button id="openRelationBtn" class="link-btn">关系图</button>
            <button id="openSummaryBtn" class="link-btn">案卷摘要</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section id="scenePage" class="page scroll">
    <div class="scene-shell">
      <div class="topline">
        <div class="topline-inner">
          <div class="topline-label">当前主线</div>
          <div id="sceneTopline" class="topline-text"></div>
        </div>
      </div>
      <div class="page-header">
        <div class="header-row">
          <button id="sceneBackBtn" class="plain-back">返回主界面</button>
          <div class="pill" id="sceneDayTag"></div>
        </div>
        <div id="sceneTitle" class="page-title"></div>
        <div id="sceneSub" class="page-sub"></div>
      </div>
      <div class="scene-content">
        <div id="sceneNarrative" class="narrative"></div>
        <div class="object-list">

function escapeHTML(text) {
  return String(text).replace(/[&<>"']/g, (char) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    "\"": "&quot;",
    "'": "&#39;"
  }[char]));
}

function stopTypewriter(node) {
  const active = typewriterControllers.get(node);
  if (active) active.cancelled = true;
  node.classList.remove("is-typing");
}

function beginTypewriter(node, signature) {
  stopTypewriter(node);
  const controller = { cancelled: false };
  typewriterControllers.set(node, controller);
  node.dataset.typeSignature = signature;
  return controller;
}

function setPlainText(node, text, key) {
  stopTypewriter(node);
  node.style.minHeight = "";
  node.classList.remove("type-locked");
  node.textContent = text || "";
  node.dataset.typeSignature = `${key}::${text || ""}`;
}

function measureNodeHeight(node, buildContent) {
  const width = node.getBoundingClientRect().width || node.parentElement?.getBoundingClientRect().width || 0;
  const clone = node.cloneNode(false);
  clone.style.position = "absolute";
  clone.style.visibility = "hidden";
  clone.style.pointerEvents = "none";
  clone.style.left = "-9999px";
  clone.style.top = "0";
  clone.style.height = "auto";
  clone.style.minHeight = "0";
  clone.style.maxHeight = "none";
  clone.style.width = `${Math.max(width, 1)}px`;
  clone.classList.remove("is-typing");
  clone.classList.remove("type-locked");
  buildContent(clone);
  document.body.appendChild(clone);
  const height = clone.getBoundingClientRect().height;
  clone.remove();
  return height;
}

function lockNodeHeight(node, buildContent) {
  const height = measureNodeHeight(node, buildContent);
  if (height > 0) {
    node.style.minHeight = `${Math.ceil(height)}px`;
    node.classList.add("type-locked");
  }
}

function prepareReveal(node, spotlight = false) {
  if (!node) return;
  node.classList.add("deferred-reveal");
  node.classList.remove("show");
  node.classList.toggle("spotlight-reveal", spotlight);
}

function showReveal(node, delay = 0) {
  if (!node) return;
  window.setTimeout(() => {
    requestAnimationFrame(() => {
      node.classList.add("show");
      node.style.visibility = "visible";
    });
  }, delay);
}

function setPageStage(pageNode, stage) {
  if (!pageNode) return;
  pageNode.classList.remove("action-mode", "scenePage-result", "dialoguePage-result", "boardPage-result");
  if (stage === "action") pageNode.classList.add("action-mode");
  if (stage === "scene-result") pageNode.classList.add("scenePage-result");
  if (stage === "dialogue-result") pageNode.classList.add("dialoguePage-result");
  if (stage === "board-result") pageNode.classList.add("boardPage-result");
}

function typeText(node, text, key) {
  const safeText = text || "";
  const signature = `${key}::${safeText}`;
  if (node.dataset.typeSignature === signature) return;
  const controller = beginTypewriter(node, signature);
  lockNodeHeight(node, (clone) => {
    clone.textContent = safeText;
  });
  node.textContent = "";
  node.classList.add("is-typing");
  let index = 0;
  const tick = () => {
    if (controller.cancelled) return;
    index += 1;
    node.textContent = safeText.slice(0, index);
    if (index < safeText.length) {
      setTimeout(tick, TYPE_SPEED);
    } else {
      node.classList.remove("is-typing");
    }
  };
  if (!safeText) {
    node.classList.remove("is-typing");
    return;
  }
  tick();
}

function typeParagraphs(node, texts, key, onDone) {
  const lines = Array.isArray(texts) ? texts : [];
  const signature = `${key}::${lines.join("||")}`;
  if (node.dataset.typeSignature === signature) {
    if (onDone) onDone();
    return;
  }
  const controller = beginTypewriter(node, signature);
  lockNodeHeight(node, (clone) => {
    clone.innerHTML = lines.map((text) => `<p>${escapeHTML(text)}</p>`).join("");
  });
  node.innerHTML = "";
  let lineIndex = 0;
  const renderLine = () => {
    if (controller.cancelled || lineIndex >= lines.length) return;
    const paragraph = document.createElement("p");
    paragraph.className = "type-line";
    node.appendChild(paragraph);
    const line = lines[lineIndex] || "";
    let charIndex = 0;
    paragraph.classList.add("is-typing");
    const tick = () => {
      if (controller.cancelled) return;
      charIndex += 1;
      paragraph.textContent = line.slice(0, charIndex);
      if (charIndex < line.length) {
        setTimeout(tick, TYPE_SPEED);
        return;
      }
      paragraph.classList.remove("is-typing");
      lineIndex += 1;
      if (lineIndex < lines.length) {
        setTimeout(renderLine, PARAGRAPH_GAP);
      } else if (onDone) {
        onDone();
      }
    };
    if (!line) {
      paragraph.classList.remove("is-typing");
      lineIndex += 1;
      if (lineIndex < lines.length) {
        setTimeout(renderLine, PARAGRAPH_GAP);
      } else if (onDone) {
        onDone();
      }
      return;
    }
    tick();
  };
  if (!lines.length) {
    if (onDone) onDone();
    return;
  }
  renderLine();
}

function typeTextSequence(items, key, onDone) {
  const signature = `${key}::${items.map((item) => item.text || "").join("||")}`;
  if (items.every((item) => item.node.dataset.typeSignature === `${item.key}::${item.text || ""}`)) {
    if (onDone) onDone();
    return;
  }
  const jobId = ++hubNarrativeJob;
  items.forEach((item) => {
    stopTypewriter(item.node);
    lockNodeHeight(item.node, (clone) => {
      clone.textContent = item.text || "";
    });
    item.node.textContent = "";
    item.node.dataset.sequenceSignature = signature;
  });
  const run = (index) => {
    if (jobId !== hubNarrativeJob || index >= items.length) return;
    const item = items[index];
    const safeText = item.text || "";
    const signatureItem = `${item.key}::${safeText}`;
    const controller = beginTypewriter(item.node, signatureItem);
    item.node.classList.add("is-typing");
    let charIndex = 0;
    const tick = () => {
      if (controller.cancelled || jobId !== hubNarrativeJob) return;
      charIndex += 1;
      item.node.textContent = safeText.slice(0, charIndex);
      if (charIndex < safeText.length) {
        setTimeout(tick, TYPE_SPEED);
        return;
      }
      item.node.classList.remove("is-typing");
      if (index + 1 < items.length) {
        setTimeout(() => run(index + 1), PARAGRAPH_GAP);
      } else if (onDone) {
        onDone();
      }
    };
    if (!safeText) {
      item.node.classList.remove("is-typing");
      if (index + 1 < items.length) {
        setTimeout(() => run(index + 1), PARAGRAPH_GAP);
      } else if (onDone) {
        onDone();
      }
      return;
    }
    tick();
  };
  run(0);
}

function applyTheme() {
  const theme = DAY_THEMES[Math.min(state.day - 1, DAY_THEMES.length - 1)] || DAY_THEMES[0];
  const root = document.documentElement;
  root.style.setProperty("--bg", theme.bg);
  root.style.setProperty("--bg-2", theme.bg2);
  root.style.setProperty("--paper", theme.paper);
  root.style.setProperty("--paper-2", theme.paper2);
}

function speechBubble(label, text, side, kind = "speech") {
  return `
    <div class="speech-row ${side}">
      <div class="speech ${side} ${kind === "meta" ? "meta" : ""}">
        <span class="speech-label">${escapeHTML(label)}</span>
        <span class="speech-text">${escapeHTML(text)}</span>
      </div>
    </div>
  `;
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function loadState() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return false;
  try {
    state = { ...initState(), ...JSON.parse(raw) };
    return true;
  } catch (error) {
    return false;
  }
}

function clearState() {
  localStorage.removeItem(STORAGE_KEY);
}

function showToast(text) {
  el.toast.textContent = text;
  el.toast.classList.add("show");
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => el.toast.classList.remove("show"), 1800);
}

function switchPage(page) {
  state.page = page;
  [el.briefingPage, el.hubPage, el.scenePage, el.dialoguePage, el.boardPage].forEach((node) => node.classList.remove("active"));
  if (page === "briefing") el.briefingPage.classList.add("active");
  if (page === "hub") el.hubPage.classList.add("active");
  if (page === "scene") el.scenePage.classList.add("active");
  if (page === "dialogue") el.dialoguePage.classList.add("active");
  if (page === "board") el.boardPage.classList.add("active");
}

function addEvidence(items) {
  items.forEach((item) => {
    if (!state.earnedEvidence.some((e) => e.id === item.id)) {
      state.earnedEvidence.push(item);
    }
  });
}

function openSheet(title, items) {
  el.sheetTitle.textContent = title;
  el.sheetBody.innerHTML = items.map((text) => `<p>${text}</p>`).join("");
  el.sheetOverlay.classList.add("show");
}

function buildResultBox(title, paragraphs, buttonText, action) {
  return `
    <div class="result-box result-spotlight pop-in">
      <span class="result-kicker">新的发现</span>
      <h4>${title}</h4>
      ${paragraphs.map((text) => `<p>${text}</p>`).join("")}
      <button class="btn btn-primary result-next" data-result-action="${action}">${buttonText}</button>
    </div>
  `;
}

function getProgressButtonText() {
  return state.day < 5 ? `进入第 ${state.day + 1} 天` : "查看最终结论";
}

function buildBriefingTaskCard() {
  return `
    <div class="briefing-task-title">调查脉络</div>
    ${BRIEFING_TASK.map((text) => `<div>• ${text}</div>`).join("")}
  `;
}

function buildLogicMap(board) {
  const groups = board.groups.map((group) => {
    const selectedId = state.boardSelections[group.key];
    const selected = group.options.find((item) => item.id === selectedId) || group.options.find((item) => item.correct);
    return {
      title: group.title,
      evidence: selected ? selected.title : "关键材料"
    };
  });
  return `
    <div class="logic-map">
      <div class="logic-chain">
        ${groups.map((item, index) => `
          <div class="logic-node">
            <strong>${item.title}</strong>
            <span>${item.evidence}</span>
          </div>
          ${index < groups.length - 1 ? '<div class="logic-arrow">↓</div>' : ""}
        `).join("")}
      </div>
      <div class="logic-final">
        <span class="result-kicker">推导结果</span>
        <h4>都指向同一个拍板人</h4>
        <p>审批被改动，平台站在前面，利益拆分等待最后过目。三条线最后收拢到同一个中心。</p>
      </div>
    </div>
  `;
}

function renderDialogueHistory() {
  el.dialogueHistory.innerHTML = state.dialogueHistory.map((item) => speechBubble(item.label, item.text, item.side, item.kind)).join("");
}

function renderBriefing() {
  prepareReveal(el.briefingPlan, false);
  prepareReveal(el.briefingTask, true);
  prepareReveal(el.briefingActions, false);
  typeParagraphs(el.briefingCopy, INTRO_COPY, "briefing-copy", () => {
    showReveal(el.briefingPlan, 120);
    if (state.briefingPlanReady) {
      showReveal(el.briefingTask, 220);
      showReveal(el.briefingActions, 380);
    }
  });
  el.briefingTask.innerHTML = buildBriefingTaskCard();
  el.briefingFoot.textContent = "五天之后，你要给出的是判断，不是猜测。";
  if (!state.briefingPlanReady) {
    el.briefingTask.classList.remove("show");
    el.briefingTask.style.visibility = "hidden";
    el.briefingActions.classList.remove("show");
    el.briefingActions.style.visibility = "hidden";
  } else {
    el.briefingTask.style.visibility = "visible";
    el.briefingActions.style.visibility = "visible";
  }
}

function renderHub() {
  const day = currentDay();
  const completed = state.actionCompleted;
  setPlainText(el.toplineText, completed ? day.toplineAfter : day.toplineBefore, `hub-topline-${state.day}-${completed}`);
  el.dayTitle.textContent = day.title;
  el.dayBadge.textContent = completed ? "当日已推进" : "尚未行动";
  el.storyNextBlock.style.display = "none";
  el.planTitle.textContent = completed ? "今天的关键推进已经完成" : "制定计划";
  el.planDesc.textContent = completed ? "你已经拿到今天的新发现，可以直接进入下一天继续推进。" : `下一步安排：${day.nextBefore}`;
  el.planBadge.textContent = completed ? "已完成" : (state.planReady ? "计划已定" : "待制定");
  el.makePlanBtn.textContent = completed ? getProgressButtonText() : "制定计划";
  el.planPanel.classList.toggle("compact", !completed && !state.planReady);
  el.planActions.classList.toggle("single", !completed && !state.planReady);
  el.planActions.classList.toggle("hidden", !completed && state.planReady);
  prepareReveal(el.planPanel, true);
  prepareReveal(el.actionWrap, true);
  typeTextSequence([
    { node: el.storyRecap, text: completed ? day.recapAfter : day.recapBefore, key: `hub-recap-${state.day}-${completed}` },
    { node: el.storySuspicion, text: completed ? day.suspicionAfter : day.suspicionBefore, key: `hub-suspicion-${state.day}-${completed}` }
  ], `hub-story-${state.day}-${completed}`, () => {
    showReveal(el.planPanel, 120);
    if (completed || state.planReady) {
      showReveal(el.actionWrap, completed ? 160 : 300);
    }
  });
  if (completed) {
    if (state.day < 5) {
      el.actionTitle.textContent = getProgressButtonText();
      el.actionDesc.textContent = "不用再回头复盘，直接带着这条发现推进下一天。";
    } else {
      el.actionTitle.textContent = getProgressButtonText();
      el.actionDesc.textContent = "今天的整理已经完成，可以查看这次调查最后得到的判断。";
    }
  } else {
    el.actionTitle.textContent = day.actionTitle;
    el.actionDesc.textContent = day.actionDesc;
  }
  if (!completed && !state.planReady) {
    el.actionWrap.classList.remove("show");
    el.actionWrap.style.visibility = "hidden";
  } else {
    el.actionWrap.style.visibility = "visible";
  }
}

function renderScene() {
  const day = currentDay();
  const scene = day.scene;
  setPageStage(el.scenePage, state.actionCompleted ? "scene-result" : "action");
  setPlainText(el.sceneTopline, state.actionCompleted ? day.toplineAfter : day.toplineBefore, `scene-topline-${state.day}-${state.actionCompleted}`);
  el.sceneDayTag.textContent = state.actionCompleted ? `${day.title} · 已发现` : `${day.title} · 行动中`;
  el.sceneDayTag.className = `pill ${state.actionCompleted ? "phase-pill-result" : "phase-pill-action"}`;
  el.sceneTitle.textContent = scene.title;
  el.sceneSub.textContent = scene.subtitle;
  prepareReveal(el.sceneObjectCard, true);
  typeParagraphs(el.sceneNarrative, scene.narrative, `scene-narrative-${state.day}`, () => showReveal(el.sceneObjectCard, 120));
  el.sceneObjectTitle.textContent = scene.objectTitle;
  setPlainText(el.sceneObjectDesc, scene.objectDesc, `scene-object-${state.day}`);
  el.sceneStartTaskBtn.style.display = (!state.sceneQuestionOpen && !state.sceneRetryVisible && !state.actionCompleted) ? "inline-flex" : "none";
  el.sceneTaskWrap.innerHTML = "";
  el.sceneResultWrap.innerHTML = "";

  if (state.sceneQuestionOpen && !state.actionCompleted) {
    el.sceneTaskWrap.innerHTML = `
      <div class="question-card pop-in result-spotlight">
        <div class="question-intro">${scene.questionIntro}</div>
        <div class="question-title">${scene.questionTitle}</div>
        <div class="option-list">
          ${scene.choices.map((choice, index) => `
            <button class="option-btn" data-scene-choice="${index}">
              <strong>${choice.label}</strong>
              <span>${choice.text}</span>
            </button>
          `).join("")}
        </div>
      </div>
    `;
  }

  if (state.sceneRetryVisible && !state.actionCompleted) {
    el.sceneTaskWrap.innerHTML = `
      <div class="result-box pop-in result-spotlight">
        <h4>这一步还不够硬</h4>
        ${scene.wrongFeedback.map((text) => `<p>${text}</p>`).join("")}
        <button class="btn btn-secondary" data-scene-retry="1">重新判断</button>
      </div>
    `;
  }

  if (state.actionCompleted) {
    el.sceneResultWrap.innerHTML = buildResultBox(day.resultTitle, day.resultParagraphs, getProgressButtonText(), "scene-finish");
  }
}

function renderDialogue() {
  const day = currentDay();
  const dialogue = day.dialogue;
  const step = dialogue.steps[state.dialogueStep];
  setPageStage(el.dialoguePage, state.actionCompleted ? "dialogue-result" : "action");
  setPlainText(el.dialogueTopline, state.actionCompleted ? day.toplineAfter : day.toplineBefore, `dialogue-topline-${state.day}-${state.actionCompleted}`);
  el.dialogueDayTag.textContent = state.actionCompleted ? `${day.title} · 已发现` : `${day.title} · 行动中`;
  el.dialogueDayTag.className = `pill ${state.actionCompleted ? "phase-pill-result" : "phase-pill-action"}`;
  el.dialogueTitle.textContent = dialogue.title;
  el.dialogueSub.textContent = dialogue.subtitle;
  typeParagraphs(el.dialogueNarrative, dialogue.narrative, `dialogue-narrative-${state.day}`);
  renderDialogueHistory();
  setPlainText(el.dialogueText, step.baseText, `dialogue-base-${state.day}-${state.dialogueStep}`);
  el.dialogueChoices.innerHTML = "";
  el.dialogueResultWrap.innerHTML = "";

  if (!state.actionCompleted) {
    if (state.dialogueInterlude) {
      const choice = step.choices[state.dialogueInterlude - 1];
      el.dialogueResultWrap.innerHTML = `
        <div class="result-box dialogue-result pop-in result-spotlight">
          ${speechBubble("你", choice.text, "you")}
          ${speechBubble("对方", choice.response, "other")}
          <button class="btn btn-primary" data-dialogue-next="1">继续追问</button>
        </div>
      `;
    } else {
      el.dialogueChoices.innerHTML = `
        <div class="question-card pop-in result-spotlight">
          <div class="question-intro">${step.prompt}</div>
          <div class="option-list">
            ${step.choices.map((choice, index) => `
              <button class="option-btn option-btn-you" data-dialogue-choice="${index}">
                <span class="speaker">你</span>
                <strong>${choice.text}</strong>
              </button>
            `).join("")}
          </div>
        </div>
      `;
    }
  }

  if (state.actionCompleted) {
    el.dialogueResultWrap.innerHTML = `
      <div class="result-box dialogue-result result-spotlight pop-in">
        <span class="result-kicker">新的口供</span>
        <h4>${day.resultTitle}</h4>
        ${step.finalText.map((text) => `<p>${text}</p>`).join("")}
        ${day.resultParagraphs.map((text) => `<p>${text}</p>`).join("")}
        <button class="btn btn-primary result-next" data-result-action="dialogue-finish">${getProgressButtonText()}</button>
      </div>
    `;
  }
}

function renderBoard() {
  const day = currentDay();
  const board = day.board;
  setPageStage(el.boardPage, state.actionCompleted ? "board-result" : "action");
  setPlainText(el.boardTopline, state.actionCompleted ? day.toplineAfter : day.toplineBefore, `board-topline-${state.day}-${state.actionCompleted}`);
  el.boardPage.querySelector(".pill").className = `pill ${state.actionCompleted ? "phase-pill-result" : "phase-pill-action"}`;
  el.boardPage.querySelector(".pill").textContent = state.actionCompleted ? "最后发现" : "行动中";
  typeParagraphs(el.boardIntro, board.intro, `board-intro-${state.day}`);
  el.boardGroups.innerHTML = board.groups.map((group) => {
    const selectedId = state.boardSelections[group.key];
    const selected = group.options.find((item) => item.id === selectedId);
    return `
      <div class="board-group">
        <div class="board-title">命题</div>
        <h4>${group.title}</h4>
        <p>${group.hint}</p>
        <div class="fact">${selected ? `已放入：${selected.title}` : "尚未放入关键材料。"}</div>
      </div>
    `;
  }).join("");
  el.boardChoices.innerHTML = "";
  el.boardResultWrap.innerHTML = state.boardMessage ? `<div class="result-box pop-in result-spotlight"><h4>系统反馈</h4><p>${state.boardMessage}</p></div>` : "";

  if (state.actionCompleted) {
    el.boardResultWrap.innerHTML = `
      <div class="result-box result-spotlight pop-in">
        <span class="result-kicker">结论闭合</span>
        <h4>${day.resultTitle}</h4>
        ${buildLogicMap(board)}
        <button class="btn btn-primary" data-result-action="board-finish">查看最终结论</button>
      </div>
    `;
    return;
  }

  const pending = board.groups.find((group) => !state.boardSelections[group.key]);
  if (!pending) {
    completeBoard();
    return;
  }

  el.boardChoices.innerHTML = `
    <div class="question-card pop-in result-spotlight">
      <div class="question-intro">现在先补这一条</div>
      <div class="question-title">${pending.title}</div>
      <div class="choice-note">${pending.hint}</div>
      <div class="option-list" style="margin-top:14px;">
        ${pending.options.map((option) => `
          <button class="evidence-btn" data-board-group="${pending.key}" data-board-option="${option.id}">
            <strong>${option.title}</strong>
            <span>${option.text}</span>
          </button>
        `).join("")}
      </div>
    </div>
  `;
}

function renderAll() {
  applyTheme();
  if (state.page === "briefing") renderBriefing();
  if (state.page === "hub") renderHub();
  if (state.page === "scene") renderScene();
  if (state.page === "dialogue") renderDialogue();
  if (state.page === "board") renderBoard();
}

function startGame() {
  state = initState();
  clearState();
  switchPage("hub");
  saveState();
  renderAll();
}

function openMainAction() {
  if (state.actionCompleted) {
    if (state.day < 5) completeDay();
    else showEnding();
    return;
  }
  if (!state.planReady) return;
  const day = currentDay();
  if (day.mode === "scene") {
    state.sceneQuestionOpen = false;
    state.sceneRetryVisible = false;
    switchPage("scene");
    renderScene();
  } else if (day.mode === "dialogue") {
    state.dialogueStep = 0;
    state.dialogueInterlude = false;
    state.dialogueLastChoice = "";
    state.dialogueLastResponse = "";
    state.dialogueHistory = [];
    switchPage("dialogue");
    renderDialogue();
  } else if (day.mode === "board") {
    switchPage("board");
    renderBoard();
  }
  saveState();
}

function completeDay() {
  if (state.day < 5) {
    state.day += 1;
    state.actionCompleted = false;
    state.sceneQuestionOpen = false;
    state.sceneRetryVisible = false;
    state.dialogueStep = 0;
    state.dialogueInterlude = false;
    state.dialogueLastChoice = "";
    state.dialogueLastResponse = "";
    state.dialogueHistory = [];
    state.briefingPlanReady = false;
    state.planReady = false;
    state.boardMessage = "";
    state.page = "hub";
    switchPage("hub");
    renderAll();
    saveState();
    return;
  }
  showEnding();
}

function sceneChoose(index) {
  const scene = currentDay().scene;
  const choice = scene.choices[index];
  const dayNum = state.day;
  if (choice.correct) {
    state.sceneQuestionOpen = false;
    state.sceneRetryVisible = false;
    if (dayNum === 1 && state.d1Score === 0) state.d1Score = 3;
    else if (dayNum === 2 && state.d2Score === 0) state.d2Score = 3;
    else if (dayNum === 4 && state.d4Score === 0) state.d4Score = 3;
    addEvidence(currentDay().evidence || []);
    showToast("你得到一条新发现");
    state.actionCompleted = true;
    renderScene();
  } else {
    state.sceneQuestionOpen = false;
    state.sceneRetryVisible = true;
    if (dayNum === 1 && state.d1Score === 0) state.d1Score = 1;
    else if (dayNum === 2 && state.d2Score === 0) state.d2Score = 1;
    else if (dayNum === 4 && state.d4Score === 0) state.d4Score = 1;
    renderScene();
  }
  saveState();
}

function dialogueChoose(index) {
  const dialogue = currentDay().dialogue;
  const step = dialogue.steps[state.dialogueStep];
  const choice = step.choices[index];
  if (state.dialogueStep === 0) {
    state.d3Round1 = index;
    if (index === 0) state.d3OptimalCount += 1;
  }
  if (state.dialogueStep === 1 && index === 0) {
    state.d3OptimalCount += 1;
  }
  if (state.dialogueStep === 2) {
    if (index === 0) state.d3OptimalCount += 1;
    state.d3Round3 = index;
    if (state.d3Round1 === 1 && index === 0) {
      state.leakTriggered = true;
    }
  }
  if (state.dialogueStep === dialogue.steps.length - 1) {
    state.dialogueLastChoice = choice.text;
    state.dialogueLastResponse = choice.response;
    state.dialogueHistory.push(
      { label: "你", text: choice.text, side: "you", kind: "speech" },
      { label: "对方", text: choice.response, side: "other", kind: "speech" }
    );
    addEvidence(currentDay().evidence || []);
    showToast("你拿到一条口供");
    state.actionCompleted = true;
    renderDialogue();
  } else {
    state.dialogueInterlude = index + 1;
    renderDialogue();
  }
  saveState();
}

function continueDialogue() {
  const dialogue = currentDay().dialogue;
  const step = dialogue.steps[state.dialogueStep];
  const choice = step.choices[state.dialogueInterlude - 1];
  if (choice) {
    state.dialogueHistory.push(
      { label: "你", text: choice.text, side: "you", kind: "speech" },
      { label: "对方", text: choice.response, side: "other", kind: "speech" }
    );
  }
  state.dialogueStep += 1;
  state.dialogueInterlude = false;
  renderDialogue();
  saveState();
}

function chooseBoardOption(groupKey, optionId) {
  const board = currentDay().board;
  const group = board.groups.find((item) => item.key === groupKey);
  const option = group.options.find((item) => item.id === optionId);
  if (!option.correct) {
    state.boardMessage = board.wrongText;
    state.d5Retries += 1;
    showToast("逻辑还没扣上");
    renderBoard();
    saveState();
    return;
  }
  state.boardSelections[groupKey] = option.id;
  state.boardMessage = `《${option.title}》已经能为“${group.title}”提供支撑。`;
  renderBoard();
  saveState();
}

function completeBoard() {
  const day = currentDay();
  state.actionCompleted = true;
  renderBoard();
  saveState();
}

function showEnding() {
  const d3Score = state.d3OptimalCount >= 2 ? 3 : (state.d3OptimalCount >= 1 ? 2 : 1);
  const d5Score = state.d5Retries === 0 ? 3 : 1;
  const totalScore = state.d1Score + state.d2Score + d3Score + state.d4Score + d5Score;
  let ending;
  if (state.leakTriggered) {
    ending = ENDINGS.C;
  } else if (totalScore >= 12) {
    ending = ENDINGS.A;
  } else if (totalScore >= 7) {
    ending = ENDINGS.B;
  } else {
    ending = ENDINGS.D;
  }
  state.ending = ending;
  el.endingGrade.textContent = ending.grade;
  el.endingTitle.textContent = ending.title;
  el.endingBody.textContent = ending.body;
  const facts = [...currentDay().dayEnd, ...ending.facts];
  el.endingFacts.innerHTML = facts.map((text) => `<div class="fact">${text}</div>`).join("");
  el.endingOverlay.classList.add("show");
  saveState();
}

function restart() {
  state = initState();
  clearState();
  switchPage("briefing");
  renderAll();
  el.endingOverlay.classList.remove("show");
  showToast("新的调查已建立");
}

el.startBtn.addEventListener("click", startGame);
el.briefingPlanBtn.addEventListener("click", () => {
  state.briefingPlanReady = true;
  renderBriefing();
  showReveal(el.briefingTask, 80);
  showReveal(el.briefingActions, 240);
  saveState();
});
el.mainActionBtn.addEventListener("click", openMainAction);
el.makePlanBtn.addEventListener("click", () => {
  if (state.actionCompleted) {
    if (state.day < 5) completeDay();
    else showEnding();
    return;
  }
  state.planReady = true;
  renderHub();
  showReveal(el.actionWrap, 80);
  saveState();
});
el.planSummaryBtn.addEventListener("click", () => openSheet(SHEETS.summary.title, SHEETS.summary.items));
el.sceneStartTaskBtn.addEventListener("click", () => {
  state.sceneQuestionOpen = true;
  state.sceneRetryVisible = false;
  renderScene();
  saveState();
});
el.sceneBackBtn.addEventListener("click", () => { switchPage("hub"); renderHub(); });
el.dialogueBackBtn.addEventListener("click", () => { switchPage("hub"); renderHub(); });
el.boardBackBtn.addEventListener("click", () => { switchPage("hub"); renderHub(); });
el.openSummaryFromBriefing.addEventListener("click", () => openSheet(SHEETS.summary.title, SHEETS.summary.items));
el.openSummaryBtn.addEventListener("click", () => openSheet(SHEETS.summary.title, SHEETS.summary.items));
el.openCharacterBtn.addEventListener("click", () => openSheet(SHEETS.characters.title, SHEETS.characters.items));
el.openRelationBtn.addEventListener("click", () => openSheet(SHEETS.relation.title, SHEETS.relation.items));
el.openEvidenceBtn.addEventListener("click", () => {
  const items = state.earnedEvidence.length ? state.earnedEvidence.map((item) => `${item.title}：${item.summary}`) : ["你手上还没有新的关键材料。先把今天这一步推进完。"];
  openSheet("查看证据", items);
});
el.closeSheetBtn.addEventListener("click", () => el.sheetOverlay.classList.remove("show"));
el.closeEndingBtn.addEventListener("click", () => el.endingOverlay.classList.remove("show"));
el.restartBtn.addEventListener("click", restart);

el.sceneTaskWrap.addEventListener("click", (event) => {
  const choice = event.target.closest("[data-scene-choice]");
  if (choice) {
    sceneChoose(Number(choice.dataset.sceneChoice));
    return;
  }
  const retry = event.target.closest("[data-scene-retry]");
  if (retry) {
    state.sceneQuestionOpen = true;
    state.sceneRetryVisible = false;
    renderScene();
    saveState();
  }
});

el.sceneResultWrap.addEventListener("click", (event) => {
  const btn = event.target.closest("[data-result-action='scene-finish']");
  if (btn) completeDay();
});

el.dialogueChoices.addEventListener("click", (event) => {
  const choice = event.target.closest("[data-dialogue-choice]");
  if (choice) dialogueChoose(Number(choice.dataset.dialogueChoice));
});

el.dialogueResultWrap.addEventListener("click", (event) => {
  const next = event.target.closest("[data-dialogue-next]");
  if (next) {
    continueDialogue();
    return;
  }
  const finish = event.target.closest("[data-result-action='dialogue-finish']");
  if (finish) completeDay();
});

el.boardChoices.addEventListener("click", (event) => {
  const btn = event.target.closest("[data-board-group]");
  if (btn) chooseBoardOption(btn.dataset.boardGroup, btn.dataset.boardOption);
});

el.boardResultWrap.addEventListener("click", (event) => {
  const btn = event.target.closest("[data-result-action='board-finish']");
  if (btn) showEnding();
});

window.addEventListener("beforeunload", saveState);

renderAll();
</script>
</body>
</html>
